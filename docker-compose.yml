# Example local deployment: the app with a persistent /data volume for its
# SQLite database. Backups are handled out-of-band in production (see
# docs/deploy/litestream.md), not by this compose file.
services:
  app:
    build:
      context: .
      args:
        BUILD_HASH: dev
    environment:
      APP_SECRET: change-me-in-prod
      DB_DIR: /data
    volumes:
      - data:/data
    ports:
      - "3000:3000"

volumes:
  data:
