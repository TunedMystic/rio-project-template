name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # vendor/ is committed, so build and test run offline with -mod=vendor.
      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          set -o pipefail
          # Standard (non-verbose) results — fails the job on any test failure.
          go test ./... -count=1
          # Report how many tests ran (cached JSON pass, used only for the count).
          echo "Tests run: $(go test ./... -json | grep -c '"Action":"run"')"

      - name: Build
        run: go build -o /dev/null .
