name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # vendor/ is committed, so build and test run offline with -mod=vendor.
      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          go test ./... -v -count=1 2>&1 | tee test.log
          echo "Tests run: $(grep -c '^=== RUN' test.log)"

      - name: Build
        run: go build -o /dev/null .
